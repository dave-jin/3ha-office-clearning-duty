<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사무실 청소 당번 보드</title>
  <meta name="description" content="사무실 청소 당번 스케줄 보드" />
  <meta name="theme-color" content="#171717" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧹</text></svg>" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: {
              primary: '#171717',
              secondary: '#1C1C1C',
              tertiary: '#262626',
              elevated: '#2A2A2A',
            },
            line: {
              DEFAULT: '#2E2E2E',
              hover: '#3E3E3E',
            },
            content: {
              primary: '#EDEDED',
              secondary: '#A1A1A1',
              tertiary: '#6B6B6B',
            },
            accent: {
              DEFAULT: '#3ECF8E',
              hover: '#2BB77A',
            },
            freepass: {
              DEFAULT: '#A78BFA',
            },
          },
          fontFamily: {
            sans: ['Inter', 'Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    };
  </script>

  <!-- Custom styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-surface-primary text-content-primary min-h-screen font-sans antialiased">

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-surface-primary/80 backdrop-blur-lg border-b border-line">
    <div class="max-w-[720px] mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
      <h1 class="text-base font-semibold flex items-center gap-2">
        <span class="text-lg">🧹</span>
        <span>Cleaning Board</span>
      </h1>
      <button id="btn-admin" class="w-8 h-8 flex items-center justify-center rounded-lg text-content-secondary hover:text-content-primary hover:bg-surface-tertiary transition-colors" title="관리자 설정">
        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Tab Navigation -->
  <nav class="sticky top-14 z-30 bg-surface-primary/80 backdrop-blur-lg border-b border-line">
    <div class="max-w-[720px] mx-auto px-4 sm:px-6 flex gap-0">
      <button data-tab="board" class="px-4 py-3 text-sm font-medium text-accent border-b-2 border-accent transition-colors">보드</button>
      <button data-tab="checklist" class="px-4 py-3 text-sm font-medium text-content-secondary hover:text-content-primary transition-colors">체크리스트</button>
      <button data-tab="changelog" class="px-4 py-3 text-sm font-medium text-content-secondary hover:text-content-primary transition-colors">로그</button>
      <button data-tab="guide" class="px-4 py-3 text-sm font-medium text-content-secondary hover:text-content-primary transition-colors">이용가이드</button>
    </div>
  </nav>

  <!-- Main content -->
  <main class="max-w-[720px] mx-auto px-4 sm:px-6 py-6">
    <div id="main-content">
      <!-- Rendered by JS -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="max-w-[720px] mx-auto px-4 sm:px-6 py-8 text-center">
    <p class="text-xs text-content-tertiary">3ha Office Cleaning Board</p>
  </footer>

  <!-- App scripts -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
